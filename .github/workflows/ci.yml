name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            2.1.x
            8.0.x

      - name: Restore
        run: dotnet restore ProjectAPI.sln

      - name: Build
        run: dotnet build ProjectAPI.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test Tests/PostLtda.Tests/PostLtda.Tests.csproj -c Release --no-build --verbosity normal
