name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest
    env:
      MSSQL_SA_PASSWORD: 'PostLtda#Dev2026'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Start SQL Server and apply seed script
        run: docker compose up -d

      - name: Wait for database seed (db-init)
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 120); do
            cid="$(docker compose ps -q db-init 2>/dev/null || true)"
            if [ -n "${cid:-}" ]; then
              st="$(docker inspect --format '{{.State.Status}}' "$cid")"
              if [ "$st" = "exited" ]; then
                code="$(docker inspect --format '{{.State.ExitCode}}' "$cid")"
                docker compose logs --no-color --tail=120 db-init || true
                exit "$code"
              fi
            fi
            sleep 2
          done
          docker compose logs --no-color --tail=200
          exit 1

      - name: Verify JujuTest database
        env:
          P: ${{ env.MSSQL_SA_PASSWORD }}
        run: |
          docker compose exec -T db /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$P" -C -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM sys.databases WHERE name = N'JujuTest'" -h -1 -W | tail -1 | grep -qx 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            2.1.x
            8.0.x

      - name: Restore
        run: dotnet restore ProjectAPI.sln

      - name: Build
        run: dotnet build ProjectAPI.sln -c Release --no-restore

      - name: Unit tests
        run: dotnet test Tests/PostLtda.Tests/PostLtda.Tests.csproj -c Release --no-build --verbosity normal
